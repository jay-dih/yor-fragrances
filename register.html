<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – YOR Fragrances</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

  <a href="index.html" class="auth-logo">YOR Fragrances</a>

  <div class="auth-container">
    <div class="auth-image">
      <img src="assets/images/auth-bg.jpg" alt="YOR" onerror="this.parentElement.style.background='linear-gradient(135deg,#c8b89a,#e8ddd0)'"/>
    </div>
    <div class="auth-form-wrap">
      <h1>Create Account</h1>
      <p class="auth-sub">Join the YOR community</p>

      <form class="auth-form" onsubmit="handleRegister(event)">
        <div class="form-field">
          <input type="text" id="regName" placeholder="Full Name" required/>
        </div>
        <div class="form-field">
          <input type="text" id="regUser" placeholder="Username" required/>
        </div>
        <div class="form-field">
          <input type="email" id="regEmail" placeholder="Email Address" required/>
        </div>
        <div class="form-field">
          <input type="password" id="regPass" placeholder="Password" required/>
        </div>
        <div class="form-field">
          <input type="password" id="regPassConfirm" placeholder="Confirm Password" required/>
        </div>
        <button type="submit" class="btn-primary btn-full">Create Account</button>
      </form>

      <p class="auth-redirect">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
